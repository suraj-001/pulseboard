server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**

        - id: team-service
          uri: lb://team-service
          predicates:
            - Path=/api/teams/**

        - id: update-service
          uri: lb://update-service
          predicates:
            - Path=/api/updates/**

        - id: analytics-service
          uri: lb://analytics-service
          predicates:
            - Path=/api/analytics/**

        - id: report-service
          uri: lb://report-service
          predicates:
            - Path=/api/reports/**

        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

logging:
  level:
    com.pulseboard: DEBUG
    org.springframework.cloud.gateway: DEBUG